<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Video Classes – GP Soldiers</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <style>
    :root{
      --gold:#f0a500;--gold-light:#fbbf24;--dark:#0a0f06;--surface:#141a0c;
      --surface2:#1e2a12;--army:#1a2a0e;--army-mid:#243614;
      --border:rgba(240,165,0,0.18);--text:#f0ebe0;--muted:#9a9080;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Barlow Condensed',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;padding-bottom:72px;}
    .app{max-width:480px;margin:0 auto;background:var(--dark);min-height:100vh;}

    /* HEADER */
    .header{background:linear-gradient(180deg,#0d1508,var(--army));border-bottom:2px solid var(--gold);padding:13px 16px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
    .header a{color:var(--gold);font-size:1.1rem;text-decoration:none;opacity:0.8;}
    .header h1{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:2px;color:var(--gold);flex:1;}
    .count-pill{background:rgba(240,165,0,0.12);border:1px solid var(--border);border-radius:20px;padding:3px 11px;font-size:0.72rem;font-weight:700;color:var(--gold);}

    /* SUBJECT TABS */
    .tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 12px;overflow-x:auto;scrollbar-width:none;}
    .tabs-wrap::-webkit-scrollbar{display:none;}
    .tabs{display:flex;gap:7px;width:max-content;}
    .tab{padding:7px 16px;border-radius:20px;font-size:0.76rem;font-weight:700;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;white-space:nowrap;font-family:inherit;}
    .tab.active{background:var(--gold);color:#000;border-color:var(--gold);}

    /* PLAYER — sticky below header */
    .player-section{display:none;background:#000;border-bottom:2px solid var(--gold);position:sticky;top:57px;z-index:90;}
    .player-section.show{display:block;}
    .player-ratio{position:relative;padding-bottom:56.25%;height:0;}
    .player-ratio iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
    .player-info{background:#0a0f06;padding:10px 14px;display:flex;align-items:flex-start;gap:10px;}
    .player-class-badge{background:var(--gold);color:#000;font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
    .player-text{flex:1;min-width:0;}
    .player-subject{font-size:0.62rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;font-weight:700;}
    .player-title{font-size:0.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .btn-close-player{background:rgba(240,165,0,0.1);border:1px solid var(--border);color:var(--gold);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:0.8rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;}

    /* BODY */
    .body{padding:12px 14px;}

    /* Subject group */
    .subject-group{margin-bottom:22px;}
    .subject-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .subject-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
    .sub-gk .subject-icon{background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.2);}
    .sub-en .subject-icon{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);}
    .sub-ka .subject-icon{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);}
    .sub-ma .subject-icon{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);}
    .subject-name{font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:1px;}
    .subject-count{font-size:0.68rem;color:var(--muted);margin-left:auto;}

    /* VIDEO CARD */
    .video-card{display:flex;gap:10px;padding:11px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:border-color 0.18s;position:relative;}
    .video-card:active{border-color:var(--gold);transform:scale(0.98);}
    .video-card.playing{border-color:var(--gold);background:var(--surface2);}

    .vc-thumb{width:100px;flex-shrink:0;border-radius:8px;overflow:hidden;position:relative;background:var(--surface2);}
    .vc-thumb img{width:100%;height:100%;object-fit:cover;display:block;aspect-ratio:16/9;}
    .vc-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
    .video-card:active .vc-play-overlay,.video-card.playing .vc-play-overlay{opacity:1;}
    .play-btn-icon{width:28px;height:28px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;padding-left:2px;}

    .class-num-badge{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.75);color:var(--gold);font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:4px;}
    .now-playing-badge{position:absolute;top:4px;right:4px;background:var(--gold);color:#000;font-size:0.55rem;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:0.5px;}

    .vc-info{flex:1;min-width:0;}
    .vc-subject-tag{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--gold);margin-bottom:3px;}
    .vc-title{font-size:0.88rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;}
    .vc-class-info{font-size:0.7rem;color:var(--muted);}

    /* EMPTY / LOADER */
    .empty{text-align:center;padding:50px 24px;color:var(--muted);}
    .empty .ei{font-size:3rem;display:block;margin-bottom:12px;opacity:0.25;}
    .empty p{font-size:0.86rem;}
    .loader{text-align:center;padding:40px;}
    .spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 8px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 7px;cursor:pointer;color:var(--muted);transition:color 0.2s;position:relative;}
    .nav-item.active{color:var(--gold);}
    .nav-item.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--gold);border-radius:0 0 3px 3px;}
    .nav-lbl{font-size:0.6rem;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-top:2px;}
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <a href="index.html">←</a>
    <h1>▶ VIDEO CLASSES</h1>
    <span class="count-pill" id="countPill">...</span>
  </div>

  <!-- SUBJECT TABS -->
  <div class="tabs-wrap">
    <div class="tabs" id="tabs">
      <button class="tab active" data-sub="all" onclick="setTab('all',this)">📚 All</button>
      <button class="tab" data-sub="General Knowledge (GK)" onclick="setTab('General Knowledge (GK)',this)">🌍 GK</button>
      <button class="tab" data-sub="English" onclick="setTab('English',this)">🔤 English</button>
      <button class="tab" data-sub="Kannada" onclick="setTab('Kannada',this)">🅺 Kannada</button>
      <button class="tab" data-sub="Maths" onclick="setTab('Maths',this)">🔢 Maths</button>
    </div>
  </div>

  <!-- PLAYER (sticky, appears when video tapped) -->
  <div class="player-section" id="playerSection">
    <div class="player-ratio">
      <iframe id="playerFrame" src="" allowfullscreen allow="autoplay;encrypted-media"></iframe>
    </div>
    <div class="player-info">
      <span class="player-class-badge" id="playerClassBadge">Class 1</span>
      <div class="player-text">
        <div class="player-subject" id="playerSubject"></div>
        <div class="player-title" id="playerTitle">—</div>
      </div>
      <button class="btn-close-player" onclick="closePlayer()">✕</button>
    </div>
  </div>

  <!-- VIDEO BODY -->
  <div class="body">
    <div class="loader" id="loader"><div class="spinner"></div></div>
    <div id="videosBody"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item" onclick="location.href='index.html'">
    <span style="font-size:1.2rem;">🏠</span>
    <span class="nav-lbl">Home</span>
  </div>
  <div class="nav-item active">
    <span style="font-size:1.2rem;">▶</span>
    <span class="nav-lbl">Videos</span>
  </div>
  <div class="nav-item" onclick="location.href='exams.html'">
    <span style="font-size:1.2rem;">📝</span>
    <span class="nav-lbl">Exams</span>
  </div>
</div>

<script>
  const API = 'https://academy-backend-e02j.onrender.com';
  let allVideos = [];
  let activeSub = 'all';
  let playingId = null;

  const SUBJECT_META = {
    'General Knowledge (GK)': { icon:'🌍', cls:'sub-gk' },
    'English':                 { icon:'🔤', cls:'sub-en' },
    'Kannada':                 { icon:'🅺', cls:'sub-ka' },
    'Maths':                   { icon:'🔢', cls:'sub-ma' },
  };

  window.onload = loadVideos;

  async function loadVideos() {
    try {
      const res = await fetch(`${API}/api/videos`);
      allVideos = await res.json();
      document.getElementById('loader').style.display = 'none';
      render();
    } catch {
      document.getElementById('loader').innerHTML = '<p style="color:#f85149;text-align:center;">Failed to load. Check connection.</p>';
    }
  }

  function setTab(sub, el) {
    activeSub = sub;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function getFiltered() {
    return activeSub === 'all' ? allVideos : allVideos.filter(v => v.subject === activeSub);
  }

  function render() {
    const filtered = getFiltered();
    document.getElementById('countPill').textContent = allVideos.length + ' Classes';

    if (!filtered.length) {
      document.getElementById('videosBody').innerHTML = `
        <div class="empty"><span class="ei">📭</span><p>No video classes yet for this subject.</p></div>`;
      return;
    }

    // Group by subject
    const groups = {};
    filtered.forEach(v => {
      if (!groups[v.subject]) groups[v.subject] = [];
      groups[v.subject].push(v);
    });

    const showHeaders = activeSub === 'all';

    document.getElementById('videosBody').innerHTML = Object.entries(groups).map(([sub, vids]) => {
      const meta = SUBJECT_META[sub] || { icon:'📚', cls:'' };
      return `
        <div class="subject-group">
          ${showHeaders ? `
            <div class="subject-header ${meta.cls}">
              <div class="subject-icon">${meta.icon}</div>
              <div class="subject-name">${sub}</div>
              <div class="subject-count">${vids.length} classes</div>
            </div>` : ''}
          ${vids.map(buildCard).join('')}
        </div>`;
    }).join('');
  }

  function buildCard(v) {
    const thumb = `https://img.youtube.com/vi/${v.youtubeId}/mqdefault.jpg`;
    const isPlaying = playingId === v._id;
    return `
      <div class="video-card ${isPlaying?'playing':''}" id="card-${v._id}" onclick="playVideo('${v._id}')">
        <div class="vc-thumb">
          <img src="${thumb}" alt="${v.title}"
            onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 9%22><rect fill=%22%231e2a12%22 width=%2216%22 height=%229%22/></svg>'">
          <div class="vc-play-overlay"><div class="play-btn-icon">▶</div></div>
          <span class="class-num-badge">Class ${v.classNumber}</span>
          ${isPlaying ? '<span class="now-playing-badge">▶ NOW</span>' : ''}
        </div>
        <div class="vc-info">
          <div class="vc-subject-tag">${v.subject}</div>
          <div class="vc-title">${v.title}</div>
          <div class="vc-class-info">Class ${v.classNumber}</div>
        </div>
      </div>`;
  }

  function playVideo(id) {
    const v = allVideos.find(x => x._id === id);
    if (!v) return;

    // Remove playing from previous card
    if (playingId && playingId !== id) {
      const prev = document.getElementById(`card-${playingId}`);
      if (prev) {
        prev.classList.remove('playing');
        const badge = prev.querySelector('.now-playing-badge');
        if (badge) badge.remove();
      }
    }

    playingId = id;

    // Update current card
    const card = document.getElementById(`card-${id}`);
    if (card) {
      card.classList.add('playing');
      if (!card.querySelector('.now-playing-badge')) {
        const badge = document.createElement('span');
        badge.className = 'now-playing-badge';
        badge.textContent = '▶ NOW';
        card.querySelector('.vc-thumb').appendChild(badge);
      }
    }

    // Show player
    const ps = document.getElementById('playerSection');
    ps.classList.add('show');
    document.getElementById('playerFrame').src = `https://www.youtube.com/embed/${v.youtubeId}?autoplay=1&rel=0`;
    document.getElementById('playerClassBadge').textContent = `Class ${v.classNumber}`;
    document.getElementById('playerSubject').textContent = v.subject;
    document.getElementById('playerTitle').textContent = v.title;

    // Scroll to top so player is visible
    ps.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function closePlayer() {
    const ps = document.getElementById('playerSection');
    ps.classList.remove('show');
    document.getElementById('playerFrame').src = '';

    if (playingId) {
      const card = document.getElementById(`card-${playingId}`);
      if (card) {
        card.classList.remove('playing');
        card.querySelector('.now-playing-badge')?.remove();
      }
    }
    playingId = null;
  }
</script>
</body>
</html>
