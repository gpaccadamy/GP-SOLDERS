<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>All Results - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="data:,">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #1f6feb;
      --primary: #238636;
      --danger: #da3633;
      --warning: #d29922;
      --text: #e6edf3;
      --muted: #8b949e;
      --live: #3fb950;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 100;
    }
    .header a { color: var(--muted); font-size: 1.2rem; text-decoration: none; transition: color 0.2s; }
    .header a:hover { color: var(--text); }
    .header h1 { font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .total-badge {
      background: var(--accent);
      color: white; padding: 3px 10px; border-radius: 20px;
      font-size: 0.76rem; font-weight: 700;
    }

    .main { padding: 18px; max-width: 900px; margin: 0 auto; }

    /* Stats Row */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
      text-align: center;
    }
    .stat-n { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700; }
    .stat-card.students .stat-n { color: var(--accent); }
    .stat-card.exams .stat-n { color: var(--primary); }
    .stat-card.avg .stat-n { color: var(--warning); }
    .stat-card.top .stat-n { color: #f0a500; }
    .stat-l { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    /* Filter Bar */
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
      margin-bottom: 16px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar input, .filter-bar select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      color: var(--text); font-size: 0.88rem; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .filter-bar input { flex: 1; min-width: 150px; }
    .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
    .filter-bar select { min-width: 140px; }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    thead { background: var(--surface2); }
    thead th {
      padding: 12px 14px;
      text-align: left;
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      white-space: nowrap;
    }
    tbody tr { border-top: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 12px 14px; font-size: 0.88rem; vertical-align: middle; }

    .rank-badge {
      width: 26px; height: 26px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.75rem;
    }
    .rank-1 { background: #f0a500; color: #000; }
    .rank-2 { background: #94a3b8; color: #000; }
    .rank-3 { background: #c2410c; color: white; }
    .rank-other { background: var(--border); color: var(--muted); }

    .student-name { font-weight: 600; color: var(--text); }
    .student-mobile { font-size: 0.76rem; color: var(--muted); }

    .exam-label { font-weight: 500; font-size: 0.86rem; }
    .exam-sub { font-size: 0.74rem; color: var(--muted); }

    .score-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-weight: 700; font-size: 0.8rem;
    }
    .score-pill.excellent { background: rgba(63,185,80,0.15); color: var(--live); border: 1px solid rgba(63,185,80,0.3); }
    .score-pill.good { background: rgba(210,153,34,0.15); color: var(--warning); border: 1px solid rgba(210,153,34,0.3); }
    .score-pill.poor { background: rgba(218,54,51,0.15); color: #f85149; border: 1px solid rgba(218,54,51,0.3); }

    .stats-mini { display: flex; gap: 8px; font-size: 0.76rem; }
    .sm-c { color: var(--live); }
    .sm-w { color: #f85149; }
    .sm-s { color: var(--warning); }

    .date-txt { font-size: 0.76rem; color: var(--muted); white-space: nowrap; }

    /* Exam group header */
    .exam-group-header {
      background: linear-gradient(90deg, rgba(31,111,235,0.12), transparent);
      border-left: 3px solid var(--accent);
      padding: 10px 14px;
    }
    .exam-group-header td {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 0.5px;
    }

    /* Empty & Loading */
    .empty-state { text-align: center; padding: 50px 24px; color: var(--muted); }
    .empty-state i { font-size: 2.5rem; margin-bottom: 12px; display: block; opacity: 0.4; }
    .loader { text-align: center; padding: 40px; color: var(--muted); }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Export btn */
    .btn-export {
      background: var(--primary); color: white;
      border: none; border-radius: 8px; padding: 8px 14px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      font-family: inherit; display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    .btn-export:hover { background: #2ea043; }

    @media (max-width: 560px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="header">
  <a href="admin.html"><i class="fas fa-arrow-left"></i></a>
  <h1><i class="fas fa-poll" style="color:#1f6feb;margin-right:7px;"></i>ALL RESULTS</h1>
  <div class="header-right">
    <span class="total-badge" id="totalBadge">0 Submissions</span>
    <button class="btn-export" onclick="exportCSV()"><i class="fas fa-download"></i> Export</button>
  </div>
</div>

<div class="main">

  <!-- Stats -->
  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-card students"><div class="stat-n" id="statStudents">0</div><div class="stat-l">Students</div></div>
    <div class="stat-card exams"><div class="stat-n" id="statExams">0</div><div class="stat-l">Exams</div></div>
    <div class="stat-card avg"><div class="stat-n" id="statAvg">0%</div><div class="stat-l">Avg Score</div></div>
    <div class="stat-card top"><div class="stat-n" id="statTop">0%</div><div class="stat-l">Top Score</div></div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍  Search student name or mobile..." oninput="applyFilter()">
    <select id="examFilter" onchange="applyFilter()">
      <option value="">All Exams</option>
    </select>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="loader" id="loader"><div class="spinner"></div><p>Loading results...</p></div>
    <div id="tableContainer"></div>
  </div>

</div>

<script>
  const API = 'https://academy-backend-e02j.onrender.com';
  let allResults = [];
  let filteredResults = [];

  window.onload = loadResults;

  async function loadResults() {
    try {
      const res = await fetch(`${API}/api/all-results`);
      allResults = await res.json();
      document.getElementById('loader').style.display = 'none';

      if (!allResults.length) {
        document.getElementById('tableContainer').innerHTML = `
          <div class="empty-state"><i class="fas fa-inbox"></i><p>No results yet. Results will appear after students submit exams.</p></div>`;
        return;
      }

      buildStats();
      buildExamFilter();
      filteredResults = [...allResults];
      renderTable();

    } catch {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('tableContainer').innerHTML = `
        <div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:#f85149;"></i><p>Failed to load results. Check server connection.</p></div>`;
    }
  }

  function buildStats() {
    const uniqueStudents = new Set(allResults.map(r => r.studentMobile)).size;
    const uniqueExams = new Set(allResults.map(r => r.examId)).size;
    const avgScore = Math.round(allResults.reduce((s, r) => s + (r.score / r.total * 100), 0) / allResults.length);
    const topScore = Math.round(Math.max(...allResults.map(r => r.score / r.total * 100)));

    document.getElementById('statStudents').textContent = uniqueStudents;
    document.getElementById('statExams').textContent = uniqueExams;
    document.getElementById('statAvg').textContent = avgScore + '%';
    document.getElementById('statTop').textContent = topScore + '%';
    document.getElementById('statsRow').style.display = 'grid';
    document.getElementById('totalBadge').textContent = allResults.length + ' Submissions';
  }

  function buildExamFilter() {
    const exams = {};
    allResults.forEach(r => { exams[r.examId] = `${r.examTitle} (Test #${r.examTestNumber})`; });
    const sel = document.getElementById('examFilter');
    Object.entries(exams).forEach(([id, label]) => {
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = label;
      sel.appendChild(opt);
    });
  }

  function applyFilter() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const examId = document.getElementById('examFilter').value;
    filteredResults = allResults.filter(r => {
      const matchSearch = !search ||
        r.studentName.toLowerCase().includes(search) ||
        r.studentMobile.includes(search);
      const matchExam = !examId || r.examId === examId;
      return matchSearch && matchExam;
    });
    renderTable();
  }

  function renderTable() {
    if (!filteredResults.length) {
      document.getElementById('tableContainer').innerHTML = `
        <div class="empty-state"><i class="fas fa-search"></i><p>No results match your filter.</p></div>`;
      return;
    }

    // Group by exam
    const byExam = {};
    filteredResults.forEach(r => {
      const key = r.examId || 'unknown';
      if (!byExam[key]) byExam[key] = { title: r.examTitle, subject: r.examSubject, testNum: r.examTestNumber, results: [] };
      byExam[key].results.push(r);
    });

    // Sort each group by score desc
    Object.values(byExam).forEach(g => g.results.sort((a, b) => b.score - a.score));

    let html = `<table>
      <thead>
        <tr>
          <th>#</th>
          <th>Student</th>
          <th>Score</th>
          <th>Breakdown</th>
          <th>Submitted</th>
        </tr>
      </thead>
      <tbody>`;

    Object.values(byExam).forEach(group => {
      html += `<tr class="exam-group-header">
        <td colspan="5">📋 ${group.title} &nbsp;|&nbsp; ${group.subject} &nbsp;|&nbsp; Test #${group.testNum} &nbsp;
          <span style="color:var(--muted);font-size:0.78rem;font-weight:400;">${group.results.length} submissions</span>
        </td>
      </tr>`;

      group.results.forEach((r, i) => {
        const pct = Math.round((r.score / r.total) * 100);
        const pillClass = pct >= 80 ? 'excellent' : pct >= 50 ? 'good' : 'poor';
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
        const date = new Date(r.submittedAt).toLocaleString('en-IN', {
          day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
        });

        html += `<tr>
          <td><span class="rank-badge ${rankClass}">${i + 1}</span></td>
          <td>
            <div class="student-name">${r.studentName}</div>
            <div class="student-mobile">${r.studentMobile}</div>
          </td>
          <td>
            <span class="score-pill ${pillClass}">${r.score}/${r.total} &nbsp; ${pct}%</span>
          </td>
          <td>
            <div class="stats-mini">
              <span class="sm-c">✅ ${r.correct}</span>
              <span class="sm-w">❌ ${r.wrong}</span>
              <span class="sm-s">⏭ ${r.unanswered}</span>
            </div>
          </td>
          <td><span class="date-txt">${date}</span></td>
        </tr>`;
      });
    });

    html += '</tbody></table>';
    document.getElementById('tableContainer').innerHTML = html;
  }

  function exportCSV() {
    if (!filteredResults.length) return alert('No results to export');
    const rows = [['Student Name', 'Mobile', 'Exam', 'Subject', 'Test No', 'Score', 'Total', 'Percentage', 'Correct', 'Wrong', 'Skipped', 'Submitted At']];
    filteredResults.forEach(r => {
      rows.push([
        r.studentName, r.studentMobile, r.examTitle, r.examSubject, r.examTestNumber,
        r.score, r.total, Math.round(r.score / r.total * 100) + '%',
        r.correct, r.wrong, r.unanswered,
        new Date(r.submittedAt).toLocaleString()
      ]);
    });
    const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `results_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }
</script>
</body>
</html>
