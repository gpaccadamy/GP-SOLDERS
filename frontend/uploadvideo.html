<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Video Classes – Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <style>
    :root {
      --gold:#f0a500; --gold-light:#fbbf24; --dark:#0a0f06; --surface:#141a0c;
      --surface2:#1e2a12; --army:#1a2a0e; --army-mid:#243614;
      --border:rgba(240,165,0,0.18); --border2:rgba(240,165,0,0.35);
      --text:#f0ebe0; --muted:#9a9080; --green:#3fb950; --red:#f85149;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Barlow Condensed',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;padding-bottom:30px;}

    /* HEADER */
    .header{background:linear-gradient(180deg,#0d1508,var(--army));border-bottom:2px solid var(--gold);padding:13px 16px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
    .header a{color:var(--gold);font-size:1.1rem;text-decoration:none;opacity:0.8;}
    .header h1{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:2px;color:var(--gold);flex:1;}
    .badge{background:rgba(240,165,0,0.15);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:0.72rem;font-weight:700;color:var(--gold);}

    .main{padding:16px;max-width:600px;margin:0 auto;}

    /* ALERT */
    .alert{padding:10px 14px;border-radius:8px;font-size:0.86rem;margin-bottom:14px;display:none;align-items:center;gap:8px;}
    .alert.show{display:flex;}
    .alert-success{background:rgba(63,185,80,0.12);border:1px solid var(--green);color:var(--green);}
    .alert-error{background:rgba(248,81,73,0.12);border:1px solid var(--red);color:var(--red);}

    /* FORM CARD */
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;position:relative;overflow:hidden;}
    .form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);}
    .form-card h2{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700;color:var(--gold);margin-bottom:18px;letter-spacing:1px;}

    .form-group{margin-bottom:14px;}
    .form-group label{display:block;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
    .form-group input,.form-group select,.form-group textarea{
      width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;
      padding:11px 14px;color:var(--text);font-size:0.92rem;font-family:inherit;
      outline:none;transition:border-color 0.2s;
    }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
    .form-group select option{background:var(--surface2);color:var(--text);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

    /* PREVIEW */
    .preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;}
    .preview-box iframe{width:100%;height:100%;border:none;}
    .preview-ph{text-align:center;color:var(--muted);}
    .preview-ph .ph-icon{font-size:2.5rem;display:block;margin-bottom:8px;opacity:0.3;}
    .preview-ph p{font-size:0.8rem;}

    /* BUTTONS */
    .btn{padding:12px 18px;border:none;border-radius:9px;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:all 0.2s;width:100%;}
    .btn-gold{background:linear-gradient(135deg,var(--gold),#d4850a);color:#000;}
    .btn-gold:active{transform:scale(0.97);}
    .btn:disabled{opacity:0.4;cursor:not-allowed;}

    /* SUBJECT TABS */
    .subject-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 8px;margin-bottom:14px;scrollbar-width:none;}
    .subject-tabs::-webkit-scrollbar{display:none;}
    .s-tab{white-space:nowrap;padding:7px 14px;border-radius:20px;font-size:0.74rem;font-weight:700;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.2s;flex-shrink:0;}
    .s-tab.active{background:var(--gold);color:#000;border-color:var(--gold);}

    /* VIDEO CARDS */
    .videos-section h2{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:14px;letter-spacing:1px;}

    .subject-group{margin-bottom:22px;}
    .subject-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
    .subject-label::after{content:'';flex:1;height:1px;background:var(--border);}

    .video-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:9px;display:flex;transition:border-color 0.2s;}
    .video-card:hover{border-color:rgba(240,165,0,0.3);}

    .vc-thumb{width:110px;flex-shrink:0;position:relative;background:var(--surface2);}
    .vc-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .vc-class-badge{position:absolute;top:5px;left:5px;background:var(--gold);color:#000;font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.5px;}

    .vc-body{flex:1;padding:11px 12px;min-width:0;}
    .vc-subject{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:3px;}
    .vc-title{font-weight:600;font-size:0.88rem;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .vc-meta{font-size:0.7rem;color:var(--muted);}

    .vc-actions{display:flex;flex-direction:column;justify-content:center;gap:6px;padding:10px 8px;flex-shrink:0;}
    .btn-icon{width:32px;height:32px;border:none;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.9rem;transition:all 0.2s;}
    .btn-edit{background:rgba(59,130,246,0.12);color:#60a5fa;}
    .btn-edit:hover{background:rgba(59,130,246,0.25);}
    .btn-del{background:rgba(248,81,73,0.12);color:var(--red);}
    .btn-del:hover{background:rgba(248,81,73,0.25);}

    /* EMPTY / LOADER */
    .empty{text-align:center;padding:40px;color:var(--muted);}
    .empty .ei{font-size:2.5rem;display:block;margin-bottom:10px;opacity:0.3;}
    .loader{text-align:center;padding:30px;color:var(--muted);}
    .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 8px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* EDIT MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
    .modal-overlay.show{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:22px 20px 36px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
    .modal-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
    .modal h3{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:18px;letter-spacing:1px;}
    .modal-btns{display:flex;gap:10px;margin-top:4px;}
    .btn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);flex:1;}
    .btn-save{background:linear-gradient(135deg,var(--gold),#d4850a);color:#000;flex:2;}
  </style>
</head>
<body>

<div class="header">
  <a href="makeexam.html">←</a>
  <h1>▶ VIDEO CLASSES</h1>
  <span class="badge" id="totalBadge">0 Videos</span>
</div>

<div class="main">
  <div class="alert" id="alertBox"></div>

  <!-- ── ADD FORM ── -->
  <div class="form-card">
    <h2>➕ Add New Class Video</h2>

    <!-- Live preview -->
    <div class="preview-box" id="previewBox">
      <div class="preview-ph">
        <span class="ph-icon">▶</span>
        <p>Paste YouTube link below to preview</p>
      </div>
    </div>

    <div class="form-group">
      <label>YouTube URL *</label>
      <input type="url" id="ytUrl" placeholder="https://youtube.com/watch?v=... or youtu.be/..." oninput="livePreview()">
    </div>

    <div class="form-group">
      <label>Video Title *</label>
      <input type="text" id="vtitle" placeholder="e.g. GK Class - Indian History">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Subject *</label>
        <select id="vsubject">
          <option value="">-- Select Subject --</option>
          <option>General Knowledge (GK)</option>
          <option>English</option>
          <option>Kannada</option>
          <option>Maths</option>
        </select>
      </div>
      <div class="form-group">
        <label>Class Number *</label>
        <input type="number" id="vclassnum" placeholder="e.g. 1" min="1">
      </div>
    </div>

    <button class="btn btn-gold" id="addBtn" onclick="addVideo()">
      💾 &nbsp; Save Class Video
    </button>
  </div>

  <!-- ── VIDEO LIST ── -->
  <div class="videos-section">
    <h2>📚 All Class Videos</h2>

    <!-- Subject filter tabs -->
    <div class="subject-tabs">
      <button class="s-tab active" data-sub="all" onclick="filterTab('all',this)">All</button>
      <button class="s-tab" data-sub="General Knowledge (GK)" onclick="filterTab('General Knowledge (GK)',this)">GK</button>
      <button class="s-tab" data-sub="English" onclick="filterTab('English',this)">English</button>
      <button class="s-tab" data-sub="Kannada" onclick="filterTab('Kannada',this)">Kannada</button>
      <button class="s-tab" data-sub="Maths" onclick="filterTab('Maths',this)">Maths</button>
    </div>

    <div class="loader" id="loader"><div class="spinner"></div><p>Loading...</p></div>
    <div id="videosList"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>✏️ Edit Class Video</h3>

    <div class="form-group">
      <label>YouTube URL *</label>
      <input type="url" id="eUrl" placeholder="YouTube URL">
    </div>
    <div class="form-group">
      <label>Video Title *</label>
      <input type="text" id="eTitle" placeholder="Video title">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Subject *</label>
        <select id="eSubject">
          <option>General Knowledge (GK)</option>
          <option>English</option>
          <option>Kannada</option>
          <option>Maths</option>
        </select>
      </div>
      <div class="form-group">
        <label>Class Number *</label>
        <input type="number" id="eClassNum" placeholder="e.g. 1" min="1">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn btn-save" onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<script>
  const API = 'https://academy-backend-e02j.onrender.com';
  let allVideos = [];
  let editingId = null;
  let activeFilter = 'all';

  window.onload = loadVideos;

  function getYTId(url) {
    const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function livePreview() {
    const url = document.getElementById('ytUrl').value.trim();
    const id = getYTId(url);
    const box = document.getElementById('previewBox');
    box.innerHTML = id
      ? `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`
      : `<div class="preview-ph"><span class="ph-icon">▶</span><p>Paste YouTube link below to preview</p></div>`;
  }

  async function loadVideos() {
    try {
      const res = await fetch(`${API}/api/videos`);
      allVideos = await res.json();
      document.getElementById('loader').style.display = 'none';
      renderList();
    } catch {
      document.getElementById('loader').innerHTML = '<p style="color:#f85149;">Failed to load. Check connection.</p>';
    }
  }

  function filterTab(sub, el) {
    activeFilter = sub;
    document.querySelectorAll('.s-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  function getFiltered() {
    return activeFilter === 'all' ? allVideos : allVideos.filter(v => v.subject === activeFilter);
  }

  function renderList() {
    const filtered = getFiltered();
    document.getElementById('totalBadge').textContent = allVideos.length + ' Videos';

    if (!filtered.length) {
      document.getElementById('videosList').innerHTML = `<div class="empty"><span class="ei">📭</span><p>No videos yet for this subject.</p></div>`;
      return;
    }

    // Group by subject
    const groups = {};
    filtered.forEach(v => {
      if (!groups[v.subject]) groups[v.subject] = [];
      groups[v.subject].push(v);
    });

    document.getElementById('videosList').innerHTML = Object.entries(groups).map(([sub, vids]) => `
      <div class="subject-group">
        <div class="subject-label">📚 ${sub} <span style="color:var(--muted);font-weight:400;">(${vids.length} classes)</span></div>
        ${vids.map(buildCard).join('')}
      </div>
    `).join('');
  }

  function buildCard(v) {
    const thumb = `https://img.youtube.com/vi/${v.youtubeId}/mqdefault.jpg`;
    const date = new Date(v.createdAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    return `
      <div class="video-card" id="vc-${v._id}">
        <div class="vc-thumb">
          <img src="${thumb}" alt="${v.title}">
          <span class="vc-class-badge">Class ${v.classNumber}</span>
        </div>
        <div class="vc-body">
          <div class="vc-subject">${v.subject}</div>
          <div class="vc-title">${v.title}</div>
          <div class="vc-meta">Added ${date}</div>
        </div>
        <div class="vc-actions">
          <button class="btn-icon btn-edit" onclick="openEdit('${v._id}')" title="Edit">✏️</button>
          <button class="btn-icon btn-del" onclick="deleteVideo('${v._id}','${v.title.replace(/'/g,"\\'")}','${v.subject}',${v.classNumber})" title="Delete">🗑️</button>
        </div>
      </div>`;
  }

  async function addVideo() {
    const ytUrl = document.getElementById('ytUrl').value.trim();
    const title = document.getElementById('vtitle').value.trim();
    const subject = document.getElementById('vsubject').value;
    const classNumber = document.getElementById('vclassnum').value.trim();

    if (!ytUrl || !title || !subject || !classNumber)
      return showAlert('All fields are required', 'error');

    document.getElementById('addBtn').disabled = true;
    try {
      const res = await fetch(`${API}/api/videos`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ title, subject, classNumber, youtubeUrl: ytUrl })
      });
      const data = await res.json();
      if (res.ok) {
        showAlert(`✅ Class ${classNumber} saved!`, 'success');
        document.getElementById('ytUrl').value = '';
        document.getElementById('vtitle').value = '';
        document.getElementById('vsubject').value = '';
        document.getElementById('vclassnum').value = '';
        document.getElementById('previewBox').innerHTML = `<div class="preview-ph"><span class="ph-icon">▶</span><p>Paste YouTube link below to preview</p></div>`;
        loadVideos();
      } else { showAlert(data.error || 'Failed', 'error'); }
    } catch { showAlert('Network error', 'error'); }
    document.getElementById('addBtn').disabled = false;
  }

  function openEdit(id) {
    const v = allVideos.find(x => x._id === id);
    if (!v) return;
    editingId = id;
    document.getElementById('eUrl').value = v.youtubeUrl;
    document.getElementById('eTitle').value = v.title;
    document.getElementById('eSubject').value = v.subject;
    document.getElementById('eClassNum').value = v.classNumber;
    document.getElementById('editModal').classList.add('show');
  }

  function closeEdit() {
    editingId = null;
    document.getElementById('editModal').classList.remove('show');
  }

  async function saveEdit() {
    const youtubeUrl = document.getElementById('eUrl').value.trim();
    const title = document.getElementById('eTitle').value.trim();
    const subject = document.getElementById('eSubject').value;
    const classNumber = document.getElementById('eClassNum').value.trim();

    if (!youtubeUrl || !title || !subject || !classNumber)
      return showAlert('All fields required', 'error');

    try {
      const res = await fetch(`${API}/api/videos/${editingId}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ title, subject, classNumber, youtubeUrl })
      });
      const data = await res.json();
      if (res.ok) {
        closeEdit();
        showAlert('✅ Updated successfully!', 'success');
        loadVideos();
      } else { showAlert(data.error || 'Update failed', 'error'); }
    } catch { showAlert('Network error', 'error'); }
  }

  async function deleteVideo(id, title, subject, classNum) {
    if (!confirm(`Delete "${title}"?\n${subject} — Class ${classNum}\n\nThis cannot be undone.`)) return;
    try {
      const res = await fetch(`${API}/api/videos/${id}`, { method:'DELETE' });
      if (res.ok) { showAlert('🗑️ Deleted', 'success'); loadVideos(); }
      else showAlert('Delete failed', 'error');
    } catch { showAlert('Network error', 'error'); }
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alertBox');
    el.className = `alert alert-${type} show`;
    el.innerHTML = msg;
    setTimeout(() => el.classList.remove('show'), 4000);
  }
</script>
</body>
</html>
